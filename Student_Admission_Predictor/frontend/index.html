<!DOCTYPE html>
<html>
<head>
    <title>Admission Predictor</title>
</head>
<body>

<h2>Student Admission Predictor</h2>

<input type="number" id="exam1" placeholder="Exam 1 Score">
<input type="number" id="exam2" placeholder="Exam 2 Score">
<button onclick="predict()">Predict</button>

<h3 id="result"></h3>

<script>
function predict() {
    let exam1 = document.getElementById("exam1").value;
    let exam2 = document.getElementById("exam2").value;

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            exam1: parseFloat(exam1),
            exam2: parseFloat(exam2)
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerText =
            data.prediction === 1 ? "Admitted 🎉" : "Not Admitted ❌";
    });
}
</script>

</body>
</html>

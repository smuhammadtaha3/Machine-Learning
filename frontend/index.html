<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Admission Dashboard - Pro Version</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; width: 90%; max-width: 1200px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); }
        .input-card { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        .graph-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .graph-box { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 12px; box-shadow: 2px 2px 10px rgba(0,0,0,0.05); }
        img { width: 100%; height: auto; border-radius: 8px; }
        input { padding: 12px; margin: 5px; width: 140px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #218838; transform: scale(1.05); }
        .status-badge { font-size: 1.5rem; margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Student Admission Dashboard</h2>
    <p>Accuracy On Training Data: <strong id="accuracy">--</strong>%</p>
    <p><strong> Score's Mid-Point: 60</strong></p>

    <div class="input-card">
        <input type="number" id="exam1" placeholder="Exam 1 Score">
        <input type="number" id="exam2" placeholder="Exam 2 Score">
        <button onclick="predict()">Predict & Live Compare</button>
        <div id="result" class="status-badge"></div>
    </div>

    <div class="graph-grid">
        <div class="graph-box">
            <h4>1. Training Reference</h4>
            <img id="default-graph" src="" alt="Default graph loading...">
        </div>
        <div class="graph-box">
            <h4>2. Your Live Position </h4>
            <img id="user-graph" src="" alt="Enter values to highlight your score">
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        fetch("http://127.0.0.1:5000/stats")
        .then(res => res.json())
        .then(data => {
            document.getElementById("accuracy").innerText = data.accuracy;
            document.getElementById("default-graph").src = data.default_graph;
        });
    };

    function predict() {
        let e1 = document.getElementById("exam1").value;
        let e2 = document.getElementById("exam2").value;
        let resultDiv = document.getElementById("result");
        let userGraph = document.getElementById("user-graph");

        if(!e1 || !e2) return alert("Values enter karein!");

        resultDiv.innerText = "Calculating...";

        fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ exam1: parseFloat(e1), exam2: parseFloat(e2) })
        })
        .then(res => res.json())
        .then(data => {
            resultDiv.innerHTML = data.prediction === 1 ? 
                "<span style='color: #28a745;'>Status: Admitted 🎉</span>" : 
                "<span style='color: #dc3545;'>Status: Not Admitted ❌</span>";
            
            // Live graph update with timestamp
            userGraph.src = data.new_graph_url + "?t=" + new Date().getTime();
        })
        .catch(() => resultDiv.innerText = "Error!");
    }
</script>

</body>
</html>
